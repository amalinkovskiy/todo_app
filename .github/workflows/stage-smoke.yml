name: Stage Smoke Tests

on:
  workflow_dispatch:
    inputs:
      stage_base_url:
        description: "Stage branch URL to validate"
        required: true
        default: "https://todo-app-git-stage-amalinkovskiys-projects.vercel.app"
      source_ref:
        description: "Git ref to checkout test code from"
        required: true
        default: "stage"

jobs:
  smoke:
    name: Run stage smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      STAGE_BASE_URL: ${{ inputs.stage_base_url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run stage smoke tests
        run: npm run test:stage

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-stage-report
          path: playwright-report-stage/
          retention-days: 7
